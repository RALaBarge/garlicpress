name: Security Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    name: Dependency & Code Security Scan
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit semgrep
          pip install -e ".[dev]" || pip install -e . || true

      - name: Run pip-audit (dependencies)
        run: |
          pip-audit --desc --skip-editable
        continue-on-error: true

      - name: Run bandit (code)
        run: |
          bandit -r . -f json -o bandit-report.json --exclude "./.venv,./.git,./tests" || true
          cat bandit-report.json
        continue-on-error: true

      - name: Run semgrep (patterns)
        run: |
          semgrep --config=p/security-audit --json -o semgrep-report.json . || true
          cat semgrep-report.json
        continue-on-error: true

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short -m "not slow" 2>/dev/null || pytest . -v --tb=short 2>/dev/null || true

  build:
    runs-on: ubuntu-latest
    name: Build & Verify Distribution
    needs: scan
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: |
          python -m build --outdir dist/

      - name: Verify distribution contents
        run: |
          twine check dist/*

      - name: Generate hashes
        run: |
          cd dist/
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
          retention-days: 30
